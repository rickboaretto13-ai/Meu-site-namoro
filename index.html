<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nosso Filme IMAX 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial;
  background:black;
  color:white;
  overflow:hidden;
  text-align:center;
}

/* FUNDO IMAX */
#intro{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at center, #ff4d6d, #000 70%);
  animation: zoomIn 3s ease;
}

@keyframes zoomIn{
  from{transform:scale(1.2); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

/* BOTÃO IMAX */
.play-btn{
  padding:18px 50px;
  font-size:22px;
  border:none;
  border-radius:60px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 0 40px #ff4d6d;
  transition:0.3s;
}

.play-btn:hover{
  transform:scale(1.1);
}

/* FILME */
#movie{
  display:none;
  padding:20px;
  animation: fade 2s ease;
}

@keyframes fade{
  from{opacity:0;}
  to{opacity:1;}
}

/* TEXTO CINEMA */
#story{
  max-width:750px;
  margin:auto;
  font-size:20px;
  line-height:1.8;
}

/* GALERIA IMAX */
.gallery{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:20px;
}

.gallery img{
  width:160px;
  height:160px;
  object-fit:cover;
  border-radius:20px;
  margin:10px;
  transition:0.3s;
  box-shadow:0 0 20px rgba(255,77,109,0.4);
}

.gallery img:hover{
  transform:scale(1.15);
}

/* CORAÇÃO IMAX */
.heart{
  position:absolute;
  font-size:90px;
  color:rgba(255,77,109,0.08);
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.4);}
  100%{transform:scale(1);}
}

/* FADE CINEMA */
#fade{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  opacity:0;
  pointer-events:none;
  transition:2s;
}

/* CRÉDITOS IMAX */
#credits{
  margin-top:40px;
  opacity:0;
  animation: credits 6s ease forwards;
  animation-delay: 28s;
  font-size:18px;
  color:#aaa;
}

@keyframes credits{
  from{opacity:0; transform:translateY(50px);}
  to{opacity:1; transform:translateY(0);}
}

/* YOUTUBE OCULTO */
#yt{
  position:absolute;
  width:1px;
  height:1px;
  left:-9999px;
}
</style>
</head>

<body>

<div id="fade"></div>

<!-- 🎧 SOM IMAX -->
<iframe
id="yt"
src="https://www.youtube.com/embed/Yi4MQecGdfA?autoplay=0&loop=1&playlist=Yi4MQecGdfA"
allow="autoplay"
frameborder="0">
</iframe>

<!-- INTRO IMAX -->
<div id="intro">
  <h1>🎬 NOSSO FILME IMAX 💖</h1>
  <p>Uma história que parece cinema...</p>
  <button class="play-btn" onclick="play()">▶ ASSISTIR</button>
</div>

<!-- FILME -->
<div id="movie">

  <h1>💖 Nossa História (IMAX EDIT)</h1>

  <p id="story"></p>

  <div class="gallery">
    <img src="./images/IMG-20260302-WA0040.jpg">
    <img src="./images/IMG-20260227-WA0008.jpg">
  </div>

  <div id="credits">
    <b>🎬 Créditos Finais</b><br><br>
    Um amor real entre duas almas 💖<br>
    Ricardo & Minha princesinha cacheadinha<br><br>
    “Fim? Não… apenas o começo.”
  </div>

</div>

<script>

window.play = function(){

  document.getElementById("fade").style.opacity=1;

  setTimeout(()=>{

    document.getElementById("intro").style.display="none";
    document.getElementById("movie").style.display="block";

    // ativa música
    let yt = document.getElementById("yt");
    yt.src = yt.src.replace("autoplay=0","autoplay=1");

    textoIMAX();
    coracoesIMAX();

  },2000);
}

/* NARRAÇÃO IMAX */
function textoIMAX(){

  const txt = `Minha princesinha cacheadinha 💖

Isso não é apenas uma história...
é um filme.

Uma história que começou sem roteiro...
mas virou algo real.

Desde 20/12/2025,
eu descobri o verdadeiro amor.

Você é minha paz, meu lar, minha vida.

E se isso for um filme...
eu nunca quero que ele acabe.`;

  let i=0;

  function escrever(){
    if(i < txt.length){
      document.getElementById("story").innerHTML += txt.charAt(i);
      i++;
      setTimeout(escrever,35);
    }
  }

  escrever();
}

/* EFEITO IMAX */
function coracoesIMAX(){

  setInterval(()=>{
    let h = document.createElement("div");
    h.classList.add("heart");
    h.innerHTML="💖";

    h.style.left = Math.random()*100+"vw";
    h.style.top = Math.random()*100+"vh";

    document.body.appendChild(h);

    setTimeout(()=>h.remove(),5000);
  },400);
}

</script>

</body>
  </html>
