<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nosso Amor 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial;
  background:black;
  color:white;
  text-align:center;
  overflow:hidden;
}

/* INTRO */
#intro{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle,#ff4d6d,#000);
}

button{
  padding:16px 40px;
  font-size:18px;
  border:none;
  border-radius:50px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 0 25px #ff4d6d;
}

/* CONTEÚDO */
#movie{
  display:none;
  padding:20px;
}

#story{
  max-width:700px;
  margin:auto;
  font-size:18px;
  line-height:1.7;
}

/* GALERIA */
.gallery img{
  width:150px;
  height:150px;
  object-fit:cover;
  border-radius:15px;
  margin:10px;
}

/* CORAÇÕES */
.heart{
  position:absolute;
  font-size:60px;
  opacity:0.2;
}

/* FADE */
#fade{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  opacity:0;
  pointer-events:none;
  transition:1.5s;
}

/* YOUTUBE OCULTO */
#yt{
  position:absolute;
  left:-9999px;
  width:1px;
  height:1px;
}
</style>
</head>

<body>

<div id="fade"></div>

<!-- 🎧 MÚSICA -->
<iframe
id="yt"
src="https://www.youtube.com/embed/Yi4MQecGdfA?autoplay=0&loop=1&playlist=Yi4MQecGdfA"
allow="autoplay"
frameborder="0">
</iframe>

<!-- INTRO -->
<div id="intro">
  <h1>💖 Nosso Amor 💖</h1>
  <p>Uma história como filme...</p>
  <button onclick="iniciarSite()">▶ ASSISTIR</button>
</div>

<!-- FILME -->
<div id="movie">

  <h1>🎬 Nossa História</h1>

  <p id="story"></p>

  <div class="gallery">
    <img src="images/IMG-20260302-WA0040.jpg">
    <img src="images/IMG-20260227-WA0008.jpg">
  </div>

</div>

<script>

function iniciarSite(){

  const intro = document.getElementById("intro");
  const movie = document.getElementById("movie");
  const fade = document.getElementById("fade");

  if(!intro || !movie){
    alert("Erro: elementos não encontrados no HTML");
    return;
  }

  fade.style.opacity = 1;

  setTimeout(() => {

    intro.style.display = "none";
    movie.style.display = "block";

    // música YouTube
    const yt = document.getElementById("yt");
    if(yt){
      yt.src = yt.src.replace("autoplay=0","autoplay=1");
    }

    escreverHistoria();
    criarCoracoes();

  }, 1000);
}

function escreverHistoria(){

  const el = document.getElementById("story");

  if(!el) return;

  const texto = `Minha princesinha cacheadinha 💖

Desde 20/12/2025 minha vida mudou completamente.

Você é minha paz, meu amor e meu lar.

E eu escolho você todos os dias.`;

  let i = 0;

  function digitar(){
    if(i < texto.length){
      el.innerHTML += texto.charAt(i);
      i++;
      setTimeout(digitar, 30);
    }
  }

  digitar();
}

function criarCoracoes(){

  setInterval(() => {

    const h = document.createElement("div");
    h.innerHTML = "💖";
    h.style.position = "absolute";
    h.style.left = Math.random()*100 + "vw";
    h.style.top = Math.random()*100 + "vh";
    h.style.opacity = "0.2";
    h.style.fontSize = "60px";

    document.body.appendChild(h);

    setTimeout(() => h.remove(), 4000);

  }, 500);
}

               </script>

</body>
</html>
