<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nosso Amor 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial;
  background:black;
  color:white;
  overflow:hidden;
  text-align:center;
}

/* INTRO */
#intro{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle,#ff4d6d,#000);
}

.play-btn{
  padding:18px 45px;
  font-size:20px;
  border:none;
  border-radius:50px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 0 30px #ff4d6d;
  transition:0.3s;
}

.play-btn:hover{
  transform:scale(1.1);
}

/* FILME */
#movie{
  display:none;
  padding:20px;
  animation: fade 2s ease;
}

@keyframes fade{
  from{opacity:0;}
  to{opacity:1;}
}

#story{
  max-width:700px;
  margin:auto;
  font-size:18px;
  line-height:1.7;
}

/* FINAL */
#final{
  margin-top:20px;
  opacity:0;
  animation: showFinal 5s ease forwards;
  animation-delay: 30s;
}

@keyframes showFinal{
  from{opacity:0;}
  to{opacity:1;}
}

.gallery{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:20px;
}

.gallery img{
  width:140px;
  height:140px;
  object-fit:cover;
  border-radius:15px;
  margin:10px;
  transition:0.3s;
}

.gallery img:hover{
  transform:scale(1.2);
}

.heart{
  position:absolute;
  font-size:80px;
  color:rgba(255,77,109,0.08);
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.3);}
  100%{transform:scale(1);}
}

#fade{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  opacity:0;
  pointer-events:none;
  transition:2s;
}

/* YouTube escondido */
#yt{
  position:absolute;
  width:1px;
  height:1px;
  left:-9999px;
}
</style>
</head>

<body>

<div id="fade"></div>

<!-- 🔊 MÚSICA (YOUTUBE) -->
<iframe
  id="yt"
  src="https://www.youtube.com/embed/Yi4MQecGdfA?autoplay=0&loop=1&playlist=Yi4MQecGdfA"
  frameborder="0"
  allow="autoplay">
</iframe>

<!-- INTRO -->
<div id="intro">
  <h1>🎬 NOSSO FILME 💖</h1>
  <p>Uma história real de amor...</p>
  <button class="play-btn" onclick="play()">▶ PLAY</button>
</div>

<!-- FILME -->
<div id="movie">

  <h1>💖 Nossa História</h1>

  <p id="story"></p>

  <div class="gallery">
    <img src="./images/IMG-20260302-WA0040.jpg">
    <img src="./images/IMG-20260227-WA0008.jpg">
  </div>

  <p id="final">
    <b>Ricardo & Minha princesinha cacheadinha 💕</b><br>
    Início: 20/12/2025
  </p>

</div>

<script>

window.play = function(){

  document.getElementById("fade").style.opacity=1;

  setTimeout(()=>{

    document.getElementById("intro").style.display="none";
    document.getElementById("movie").style.display="block";

    // tenta iniciar música (YouTube)
    let yt = document.getElementById("yt");
    yt.src = yt.src.replace("autoplay=0","autoplay=1");

    textoHollywood();
    coracoesFundo();

  },2000);
}

function textoHollywood(){

  const txt = `Minha princesinha cacheadinha 💖
Essa não é apenas uma história...
é o nosso filme.

Desde 20/12/2025, tudo mudou.

Você se tornou meu amor, minha paz e minha motivação.

Cada dia ao seu lado parece cena de filme.

E eu escolheria você em qualquer universo.`;

  let i=0;

  function escrever(){
    if(i < txt.length){
      document.getElementById("story").innerHTML += txt.charAt(i);
      i++;
      setTimeout(escrever,40);
    }
  }

  escrever();
}

function coracoesFundo(){

  setInterval(()=>{
    let h = document.createElement("div");
    h.classList.add("heart");
    h.innerHTML="💖";

    h.style.left = Math.random()*100+"vw";
    h.style.top = Math.random()*100+"vh";

    document.body.appendChild(h);

    setTimeout(()=>h.remove(),5000);
  },500);
}

</script>

</body>
    </html>
