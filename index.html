<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>GOD MODE 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family: Arial;
  overflow:hidden;
}

/* 🔐 LOGIN */
#access{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

input{
  padding:12px;
  border-radius:10px;
  border:none;
  margin:10px;
  text-align:center;
}

button{
  padding:12px 35px;
  border:none;
  border-radius:25px;
  background:#e50914;
  color:white;
  cursor:pointer;
}

/* 🎬 APP */
#app{
  display:none;
  text-align:center;
  padding:20px;
}

/* TEXTO */
#story{
  max-width:800px;
  margin:auto;
  font-size:22px;
  line-height:1.9;
  opacity:0;
  transition:2s;
}

/* IMAGENS CINEMÁTICAS */
.img{
  display:none;
  margin-top:20px;
  opacity:0;
  transition:2s;
}

.img img{
  width:220px;
  border-radius:10px;
}

/* CARTA */
#carta{
  display:none;
  margin-top:25px;
  color:#ff4d6d;
  font-size:22px;
  white-space:pre-line;
}

/* CONTROLES */
#controls{
  display:none;
  margin-top:20px;
}

/* CORAÇÕES PROFUNDOS */
.heart{
  position:absolute;
  animation:float 7s linear forwards;
  opacity:0.8;
}

@keyframes float{
  from{transform:translateY(100vh) scale(0.8);}
  to{transform:translateY(-100vh) scale(1.2);}
}

/* FADE CINEMA */
#fade{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  opacity:0;
  pointer-events:none;
  transition:3s;
}
</style>
</head>

<body>

<div id="fade"></div>

<!-- 🎧 MÚSICA -->
<iframe id="music"
width="0" height="0"
src="https://www.youtube.com/embed/Yi4MQecGdfA?enablejsapi=1"
allow="autoplay"></iframe>

<!-- 🔐 ACESSO -->
<div id="access">
  <h2>🔐 GOD ACCESS</h2>
  <p>Insira a chave emocional</p>
  <input id="senha" placeholder="key">
  <button onclick="enter()">Desbloquear</button>
</div>

<!-- 🎬 APP -->
<div id="app">

  <h1>💖 GOD MODE ACTIVE</h1>

  <p id="story"></p>

  <div class="img" id="img1">
    <img src="images/IMG-20260302-WA0040.jpg">
  </div>

  <div class="img" id="img2">
    <img src="images/IMG-20260227-WA0008.jpg">
  </div>

  <div id="carta"></div>

  <div id="controls">
    <button onclick="whats()">💬 Responder</button>
    <button onclick="location.reload()">🔁 Reassistir</button>
  </div>

</div>

<script>

/* 🔐 ACESSO GOD */
function enter(){
  let senha = document.getElementById("senha").value;

  if(senha === "20.12.2025"){

    access.style.display="none";
    app.style.display="block";

    music.src += "&autoplay=1";

    start();

  } else {
    alert("❌ chave incorreta");
  }
}

/* 🎬 INÍCIO */
function start(){
  escrever();
  coracoes();
}

/* 📖 TEXTO GOD MODE */
function escrever(){

  const texto = `isso não é um site.

é uma lembrança viva.

criada para uma única pessoa.

você.

Mais um mês ao seu lado

olha onde chegamos meu amor algo incrível 
  
que nenhum de nós 2 pensamos em passar,

um ensinando o outro em cada questão de vida.

Mais...`;

  let i = 0;

  function type(){
    story.style.opacity = 1;

    if(i < texto.length){
      story.innerHTML += texto.charAt(i);
      i++;
      setTimeout(type, 55);
    } else {

      setTimeout(()=>{
        img1.style.display="block";
        img1.style.opacity=1;
      },1200);

      setTimeout(()=>{
        img2.style.display="block";
        img2.style.opacity=1;
      },2600);

      setTimeout(()=>{
        fade.style.opacity=0.6;
      },4000);

      setTimeout(cartaFinal,5000);
    }
  }

  type();
}

/* 💌 CARTA FINAL GOD */
function cartaFinal(){

  const texto = `eu não criei isso por acaso.

eu criei porque você significa tudo.

e isso aqui é só uma forma pequena

de mostrar um sentimento gigante.

Mais mesmo criando um site ainda

não chega perto do que eu sou capaz

de fazer por você, por nós.

quero sempre te fazer mulher mais feliz desse mundo

eu agradeço por cada conselho e até mesmo

as broncas 🙄,

mais no fundo eu sei que é pro meu bem.

EU TE AMO MUITÃO TÃO TÃO MINHA PRINCESA.`;

  carta.style.display="block";

  let i = 0;

  function type(){
    if(i < texto.length){
      carta.innerHTML += texto.charAt(i);
      i++;
      setTimeout(type,45);
    } else {
      controls.style.display="block";
    }
  }

  type();
}

/* 💬 WHATS */
function whats(){
  window.open("https://wa.me/5511978297307?text=Eu%20vi%20tudo%20💖","_blank");
}

/* 💖 CORAÇÕES PROFUNDOS */
function coracoes(){
  setInterval(()=>{
    let h = document.createElement("div");
    h.innerHTML="💖";
    h.className="heart";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),7000);
  },250);
}

</script>

</body>
</html>
