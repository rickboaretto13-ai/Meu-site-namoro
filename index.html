<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nosso Filme</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial;
  background:black;
  color:white;
}

/* LOADING CINEMA */
#loading{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:black;
}

.logo{
  font-size:45px;
  color:#e50914;
  font-weight:bold;
}

/* HOME */
#home{
  display:none;
  height:100vh;
  background:url('images/IMG-20260302-WA0040.jpg') center/cover;
}

.overlay{
  background:rgba(0,0,0,0.6);
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

button{
  padding:15px 40px;
  background:#e50914;
  border:none;
  color:white;
  font-size:18px;
  border-radius:5px;
  cursor:pointer;
  margin:10px;
}

/* PLAYER */
#player{
  display:none;
  padding:20px;
  text-align:center;
}

#story{
  max-width:700px;
  margin:auto;
  font-size:18px;
  line-height:1.7;
}

/* FINAL SECRETO */
#final{
  display:none;
  margin-top:30px;
  font-size:20px;
  color:#ff4d6d;
}

/* GALERIA */
.gallery img{
  width:150px;
  margin:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- 🎧 MÚSICA -->
<iframe id="music"
width="0" height="0"
src="https://www.youtube.com/embed/Yi4MQecGdfA?enablejsapi=1"
allow="autoplay"></iframe>

<!-- LOADING -->
<div id="loading">
  <div class="logo">NETFLIX 💖</div>
  <p>Preparando seu filme...</p>
</div>

<!-- HOME -->
<div id="home">
  <div class="overlay">
    <h1>Minha Princesinha Cacheadinha 💖</h1>
    <button onclick="start()">▶ Assistir Filme</button>
  </div>
</div>

<!-- PLAYER -->
<div id="player">

  <h2 id="titulo"></h2>
  <p id="story"></p>

  <div class="gallery">
    <img src="images/IMG-20260302-WA0040.jpg">
    <img src="images/IMG-20260227-WA0008.jpg">
    <img src="images/IMG_20260228_223305.jpg">
    <img src="images/Screenshot_2026-03-08-12-21-54-801_com.miui.gallery.jpg">
    <img src="images/IMG-20260302-WA0042.jpg">
    <img src="images/IMG_20260227_120614.jpg">
    <img src="images/IMG-20260302-WA0051.jpg">
    <img src="images/IMG-20260302-WA0042.jpg">
  </div>

  <button onclick="final()">💌 Final Especial</button>

  <div id="final">
    💖 Você é a melhor coisa que aconteceu na minha vida.
    Eu te amo para sempre. 💖
  </div>

</div>

<script>

/* LOADING */
setTimeout(()=>{
  loading.style.display="none";
  home.style.display="block";
},2000);

/* START */
function start(){

  home.style.display="none";
  player.style.display="block";

  let m = document.getElementById("music");
  m.src += "&autoplay=1";

  escrever();
}

/* TEXTO */
function escrever(){

  const texto = `Minha princesinha cacheadinha 💖

Desde 20/12/2025, tudo mudou.

Você se tornou meu amor, minha paz, minha vida.

E se isso for um filme...
eu nunca quero que acabe.`;

  let i = 0;

  function digitar(){
    if(i < texto.length){
      story.innerHTML += texto.charAt(i);
      i++;
      setTimeout(digitar, 30);
    }
  }

  digitar();
}

/* FINAL */
function final(){
  document.getElementById("final").style.display="block";
}

</script>

</body>
</html>
