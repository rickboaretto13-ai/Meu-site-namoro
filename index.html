<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>💖 Só pra você</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Georgia;
  background:black;
  color:white;
  overflow:hidden;
  text-align:center;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

input{
  padding:12px;
  border-radius:10px;
  border:none;
  margin:10px;
  text-align:center;
}

button{
  padding:12px 30px;
  background:#ff4d6d;
  border:none;
  color:white;
  border-radius:20px;
  cursor:pointer;
}

/* SITE */
#site{
  display:none;
  padding:20px;
}

/* TEXTO */
#story{
  max-width:700px;
  margin:auto;
  font-size:22px;
  line-height:1.8;
}

/* FOTO */
.img{
  display:none;
  margin-top:20px;
}

.img img{
  width:220px;
  border-radius:15px;
}

/* CARTA */
#carta{
  display:none;
  margin-top:25px;
  color:#ff4d6d;
  font-size:22px;
  white-space:pre-line;
}

/* WHATSAPP */
#whats{
  display:none;
  margin-top:20px;
}

/* CORAÇÕES */
.heart{
  position:absolute;
  animation:float 6s linear forwards;
}

@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-100vh);}
}
</style>
</head>

<body>

<!-- 🎧 MÚSICA -->
<iframe id="music"
width="0" height="0"
src="https://www.youtube.com/embed/Yi4MQecGdfA?enablejsapi=1"
allow="autoplay"></iframe>

<!-- 🔐 LOGIN -->
<div id="login">
  <h2>💖 Área exclusiva</h2>
  <p>Digite sua senha, minha princesa</p>
  <input id="senha" placeholder="senha">
  <button onclick="entrar()">Entrar</button>
</div>

<!-- 💖 SITE -->
<div id="site">

  <h1>💖 Só você e eu 💖</h1>

  <p id="story"></p>

  <div class="img" id="img1">
    <img src="images/IMG-20260302-WA0040.jpg">
  </div>

  <div class="img" id="img2">
    <img src="images/IMG-20260227-WA0008.jpg">
  </div>

  <div id="carta"></div>

  <!-- 💬 WHATSAPP -->
  <div id="whats">
    <button onclick="responder()">💬 Me responde</button>
  </div>

</div>

<script>

/* 🔐 SENHA SIMPLES */
function entrar(){
  let senha = document.getElementById("senha").value;

  if(senha === "20/12/2025"){
    login.style.display="none";
    site.style.display="block";

    music.src += "&autoplay=1";
    start();
  } else {
    alert("senha errada 💔");
  }
}

/* 🎬 INICIO */
function start(){
  escrever();
  coracoes();
}

/* 📖 HISTÓRIA EXCLUSIVA */
function escrever(){

  const texto = `Minha princesa...

Esse site não é pra qualquer pessoa.

É só pra você.

Você é meu mundo inteiro.

E mesmo quando eu erro...

eu ainda te escolho.

Sempre.`;

  let i = 0;

  function digitar(){
    if(i < texto.length){
      story.innerHTML += texto.charAt(i);
      i++;
      setTimeout(digitar, 50);
    } else {

      setTimeout(()=> img1.style.display="block", 1000);
      setTimeout(()=> img2.style.display="block", 2500);

      setTimeout(()=>{
        carta.style.display="block";
        escreverCarta();
      },4000);
    }
  }

  digitar();
}

/* 💌 CARTA FINAL */
function escreverCarta(){

  const texto = `Eu não preciso de nada no mundo...

só de você.

Se um dia você duvidar disso...

lembra desse site.

Ele foi feito pensando em cada detalhe seu.

💖 Eu te amo.`;

  let i = 0;

  function digitar(){
    if(i < texto.length){
      carta.innerHTML += texto.charAt(i);
      i++;
      setTimeout(digitar, 40);
    } else {
      setTimeout(()=>whats.style.display="block", 1000);
    }
  }

  digitar();
}

/* 💬 WHATSAPP */
function responder(){
  window.open("https://wa.me/5511978297307?text=Eu%20vi%20o%20site%20💖", "_blank");
}

/* 💖 CORAÇÕES */
function coracoes(){
  setInterval(()=>{
    let h = document.createElement("div");
    h.innerHTML="💖";
    h.className="heart";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
  },300);
}

</script>

</body>
</html>
