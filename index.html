<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nossa Série 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial;
  background:#111;
  color:white;
}

/* LOADING */
#loading{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
  flex-direction:column;
}

.logo{
  color:#e50914;
  font-size:40px;
  font-weight:bold;
}

/* HOME */
#home{
  display:none;
  height:100vh;
  background:url('images/IMG-20260302-WA0040.jpg') center/cover;
}

.center{
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
}

button{
  padding:15px 40px;
  background:#e50914;
  border:none;
  color:white;
  font-size:18px;
  border-radius:5px;
  cursor:pointer;
  margin:10px;
}

/* EPISÓDIOS */
#episodes{
  display:none;
  padding:20px;
  text-align:center;
}

/* PLAYER */
#player{
  display:none;
  padding:20px;
  text-align:center;
}

#story{
  max-width:700px;
  margin:auto;
  font-size:18px;
  line-height:1.7;
}

/* GALERIA */
.gallery{
  margin-top:20px;
}

.gallery img{
  width:150px;
  border-radius:10px;
  margin:10px;
}
</style>
</head>

<body>

<!-- 🎧 MÚSICA -->
<iframe id="music"
width="0" height="0"
src="https://www.youtube.com/embed/Yi4MQecGdfA?enablejsapi=1"
allow="autoplay"></iframe>

<!-- LOADING -->
<div id="loading">
  <div class="logo">NETFLIX 💖</div>
  <p>Carregando sua história...</p>
</div>

<!-- HOME -->
<div id="home">
  <div class="center">
    <h1>Nossa Série 💖</h1>
    <button onclick="entrar()">▶ Assistir</button>
  </div>
</div>

<!-- EPISÓDIOS -->
<div id="episodes">
  <h2>Temporada 1</h2>
  <button onclick="playEp(1)">Episódio 1 - O Começo</button>
  <button onclick="playEp(2)">Episódio 2 - O Amor</button>
  <button onclick="playEp(3)">Episódio 3 - Para Sempre</button>
</div>

<!-- PLAYER -->
<div id="player">
  <h2 id="titulo"></h2>
  <p id="story"></p>

  <div class="gallery">
    <img src="images/IMG-20260302-WA0040.jpg">
    <img src="images/IMG-20260227-WA0008.jpg">
    <img src="images/IMG_20260228_223305.jpg">
    <img src="images/Screenshot_2026-03-08-12-21-54-801_com.miui.gallery.jpg">
    <img src="images/IMG-20260302-WA0042.jpg">
    <img src="images/IMG_20260227_120614.jpg">
  </div>

  <button onclick="voltar()">⬅ Voltar</button>
</div>

<script>

/* LOADING */
setTimeout(()=>{
  loading.style.display="none";
  home.style.display="block";
},2000);

/* ENTRAR */
function entrar(){

  home.style.display="none";
  episodes.style.display="block";

  // tocar música
  let m = document.getElementById("music");
  m.src += "&autoplay=1";
}

/* EPISÓDIOS */
function playEp(ep){

  episodes.style.display="none";
  player.style.display="block";

  let texto = "";

  if(ep == 1){
    titulo.innerText = "Episódio 1 - O Começo";
    texto = `Tudo começou em 20/12/2025...
    quando nossas vidas se cruzaram.`;
  }

  if(ep == 2){
    titulo.innerText = "Episódio 2 - O Amor";
    texto = `Você virou minha paz, meu amor,
    minha princesinha cacheadinha 💖`;
  }

  if(ep == 3){
    titulo.innerText = "Episódio 3 - Para Sempre";
    texto = `E se essa for uma série...
    eu nunca quero que acabe.
    Eu escolho você todos os dias 💕`;
  }

  escrever(texto);
}

/* TEXTO */
function escrever(texto){

  story.innerHTML = "";
  let i = 0;

  function digitar(){
    if(i < texto.length){
      story.innerHTML += texto.charAt(i);
      i++;
      setTimeout(digitar, 25);
    }
  }

  digitar();
}

/* VOLTAR */
function voltar(){
  player.style.display="none";
  episodes.style.display="block";
}

</script>

</body>
      </html>
