<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Netflix Love 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#111;
  color:white;
  overflow-x:hidden;
}

/* LOADING */
#loading{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
}

.logo{
  font-size:40px;
  font-weight:bold;
  color:#e50914;
  letter-spacing:2px;
}

.bar{
  width:200px;
  height:4px;
  background:#333;
  margin-top:20px;
  overflow:hidden;
  border-radius:10px;
}

.bar div{
  width:0%;
  height:100%;
  background:#e50914;
  animation:load 2s forwards;
}

@keyframes load{
  to{width:100%;}
}

/* HOME */
#home{
  display:none;
  height:100vh;
  background:linear-gradient(to bottom, rgba(0,0,0,0.3), black),
  url('images/IMG-20260302-WA0040.jpg');
  background-size:cover;
  background-position:center;
}

.center{
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

button{
  padding:15px 40px;
  font-size:18px;
  background:#e50914;
  border:none;
  color:white;
  border-radius:5px;
  cursor:pointer;
  font-weight:bold;
}

/* CONTENT */
#content{
  display:none;
  padding:20px;
  background:black;
}

#story{
  max-width:800px;
  margin:auto;
  font-size:18px;
  line-height:1.8;
  text-align:center;
  color:#ddd;
}

/* GALERIA */
.row{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:20px;
}

.row img{
  width:160px;
  height:160px;
  object-fit:cover;
  border-radius:10px;
  transition:0.3s;
}

.row img:hover{
  transform:scale(1.1);
}
</style>
</head>

<body>

<!-- 🎧 MÚSICA (YOUTUBE OCULTO) -->
<iframe
id="music"
width="0"
height="0"
src="https://www.youtube.com/embed/Yi4MQecGdfA?enablejsapi=1"
frameborder="0"
allow="autoplay">
</iframe>

<!-- LOADING -->
<div id="loading">
  <div class="logo">NETFLIX</div>
  <div class="bar"><div></div></div>
</div>

<!-- HOME -->
<div id="home">
  <div class="center">
    <h1>💖 Uma história real</h1>
    <button onclick="entrar()">▶ Assistir agora</button>
  </div>
</div>

<!-- CONTENT -->
<div id="content">

  <h2 style="text-align:center;">Nossa História 💖</h2>

  <p id="story"></p>

  <div class="row">
    <img src="images/IMG-20260302-WA0040.jpg">
    <img src="images/IMG-20260227-WA0008.jpg">
    <img src="IMG_20260228_223305.jpg">
    <img src="Screenshot_2026-03-08-12-21-54-801_com.miui.gallery.jpg">
  </div>

</div>

<script>

/* LOADING */
setTimeout(()=>{
  document.getElementById("loading").style.display="none";
  document.getElementById("home").style.display="block";
},2500);

/* ENTRAR */
function entrar(){

  document.getElementById("home").style.display="none";
  document.getElementById("content").style.display="block";

  // 🎧 ativa música
  const music = document.getElementById("music");
  if(music){
    music.src = music.src + "&autoplay=1";
  }

  escrever();
}

/* TEXTO CINEMA */
function escrever(){

  const el = document.getElementById("story");

  const texto = `Minha princesinha cacheadinha 💖

Desde 20/12/2025, tudo mudou.

Você virou minha paz, meu amor e meu lar.

Não é só namoro… é série da vida real.

Eu escolho você todos os dias.

Ricardo & Minha princesa 💕`;

  let i = 0;

  function digitar(){
    if(i < texto.length){
      el.innerHTML += texto.charAt(i);
      i++;
      setTimeout(digitar, 25);
    }
  }

  digitar();
}

</script>

</body>
</html>
